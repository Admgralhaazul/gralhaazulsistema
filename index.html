<!DOCTYPE html>

<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gralha Azul — Plataforma Integrada</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="./index_files/css2" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;width:100vw;overflow:hidden;background:#0b1220;font-family:"DM Sans",system-ui,sans-serif}
#ga-navbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(11,18,32,0.98);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;z-index:999999;padding:0 20px;gap:0}
.ga-logo{display:flex;align-items:center;gap:10px;padding-right:20px;margin-right:8px;border-right:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.ga-logo-icon{width:28px;height:28px;background:#1e3a5f;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.ga-logo-name{font-size:12.5px;font-weight:600;color:#e2e8f0}
.ga-logo-sub{font-size:9px;color:rgba(255,255,255,0.28);letter-spacing:0.8px;text-transform:uppercase}
.ga-tabs{display:flex;align-items:stretch;height:48px;margin-left:4px}
.ga-tab{display:flex;align-items:center;gap:9px;padding:0 22px;height:100%;font-size:12.5px;font-weight:500;color:rgba(255,255,255,0.38);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.18s;user-select:none;flex-shrink:0}
.ga-tab:hover{color:rgba(255,255,255,0.72);background:rgba(255,255,255,0.03)}
.ga-tab.act-r{color:#fff;border-bottom-color:#e8720c;background:rgba(232,114,12,0.05)}
.ga-tab.act-g{color:#fff;border-bottom-color:#4f8ef7;background:rgba(79,142,247,0.05)}
.ga-tab-ico{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:rgba(255,255,255,0.06)}
.act-r .ga-tab-ico{background:rgba(232,114,12,0.2)}
.act-g .ga-tab-ico{background:rgba(79,142,247,0.2)}
.ga-divider{width:1px;height:20px;background:rgba(255,255,255,0.07);margin:0 4px;align-self:center}
.ga-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.ga-online{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.28)}
.ga-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,0.2)}
.ga-frame{position:fixed;top:48px;left:0;right:0;bottom:0;width:100%;height:calc(100vh - 48px);border:none;display:none;opacity:0;transition:opacity 0.18s}
.ga-frame.ga-on{display:block;opacity:1}
</style>
</head>
<body>

<div id="ga-navbar">
  <div class="ga-logo">
    <div class="ga-logo-icon">🦜</div>
    <div>
      <div class="ga-logo-name">Gralha Azul</div>
      <div class="ga-logo-sub">Plataforma Integrada</div>
    </div>
  </div>
  <div class="ga-tabs">
    <div class="ga-tab" id="ga-tab-r" onclick="gaSw(&#39;r&#39;)">
      <div class="ga-tab-ico">📋</div>
      <span>Rescisões</span>
    </div>
    <div class="ga-divider"></div>
    <div class="ga-tab act-g" id="ga-tab-g" onclick="gaSw(&#39;g&#39;)">
      <div class="ga-tab-ico">🏢</div>
      <span>Gestão Administrativa</span>
    </div>
  </div>
  <div class="ga-right">
    <div class="ga-online"><div class="ga-dot"></div><span>Online</span></div>
  </div>
</div>

<iframe id="ga-frame-r" class="ga-frame" style="display: none; opacity: 0;" src="./index_files/rescisoes.html"></iframe>
<iframe id="ga-frame-g" class="ga-frame ga-on" style="display: block; opacity: 1;" src="./index_files/gestao.html"></iframe>

<script>
var gaCur = 'r';
function gaSw(which) {
  if (gaCur === which) return;
  var old = document.getElementById('ga-frame-' + gaCur);
  var nw  = document.getElementById('ga-frame-' + which);
  old.style.opacity = '0';
  setTimeout(function() {
    old.style.display = 'none';
    old.classList.remove('ga-on');
    nw.style.display = 'block';
    nw.classList.add('ga-on');
    requestAnimationFrame(function() { nw.style.opacity = '1'; });
  }, 160);
  gaCur = which;
  ['r','g'].forEach(function(k) {
    document.getElementById('ga-tab-' + k).className = 'ga-tab' + (k === which ? ' act-' + which : '');
  });
  try { localStorage.setItem('ga_tab', which); } catch(e) {}
}
(function() {
  var t = 'r';
  try { t = localStorage.getItem('ga_tab') || 'r'; } catch(e) {}
  if (t !== 'r') { gaCur = 'r'; gaSw(t); }
})();
</script>


</body></html>
